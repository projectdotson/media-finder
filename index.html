<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Finder - Discover Content From Images</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; padding: 40px 20px; }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .subtitle { color: #a0a0a0; font-size: 1.1rem; }
        .model-status {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        .model-status.loading { color: #ffd700; }
        .model-status.ready { color: #4CAF50; }
        .model-status.error { color: #ff6b6b; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .upload-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-align: center;
        }
        .upload-section:hover, .upload-section.dragover {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.05);
        }
        .upload-buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        input[type="file"] { display: none; }
        .drop-hint { color: #666; margin-top: 15px; font-size: 0.9rem; }
        .preview-container { margin-top: 20px; display: none; }
        .preview-container.active { display: block; }
        #preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .camera-container { display: none; margin-top: 20px; }
        .camera-container.active { display: block; }
        #camera-video { width: 100%; max-width: 500px; border-radius: 10px; }
        .caption-display {
            background: rgba(233, 69, 96, 0.2);
            border-left: 4px solid #e94560;
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 0 10px 10px 0;
            font-style: italic;
        }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .results-section { display: none; }
        .results-section.active { display: block; }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border-color: #e94560;
        }
        .result-card a { text-decoration: none; color: inherit; display: block; }
        .card-thumbnail {
            width: 100%; height: 160px; object-fit: cover;
            background: rgba(255, 255, 255, 0.1);
        }
        .card-thumbnail.placeholder {
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
        }
        .card-content { padding: 15px; }
        .card-type {
            display: inline-block; padding: 4px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 10px;
        }
        .card-type.youtube { background: #ff0000; }
        .card-type.article { background: #4CAF50; }
        .card-type.image { background: #9c27b0; }
        .card-title {
            font-size: 1rem; font-weight: 600; margin-bottom: 5px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-meta { color: #a0a0a0; font-size: 0.85rem; }
        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border-left: 4px solid #ff0000;
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 0 10px 10px 0;
            display: none;
        }
        .error-message.active { display: block; }
        footer { text-align: center; padding: 40px; color: #666; }
        footer a { color: #e94560; text-decoration: none; }
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .upload-section { padding: 25px; }
            .btn { padding: 12px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Media Finder</h1>
            <p class="subtitle">Upload a photo and discover related content across the web</p>
            <div class="model-status loading" id="model-status">
                ⏳ Loading AI model... (first time ~30-60s)
                <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 0%"></div></div>
            </div>
        </header>
        
        <section class="upload-section" id="upload-section">
            <div class="upload-buttons">
                <button class="btn btn-primary" id="upload-btn" disabled>📁 Upload Photo</button>
                <button class="btn btn-secondary" id="camera-btn" disabled>📷 Take Photo</button>
                <input type="file" id="file-input" accept="image/*">
            </div>
            <p class="drop-hint">or drag & drop an image here</p>
            
            <div class="camera-container" id="camera-container">
                <video id="camera-video" autoplay playsinline></video>
                <br><br>
                <button class="btn btn-primary" id="capture-btn">📸 Capture</button>
                <button class="btn btn-secondary" id="close-camera-btn">✕ Cancel</button>
            </div>
            
            <div class="preview-container" id="preview-container">
                <img id="preview-image" alt="Preview">
                <br><br>
                <button class="btn btn-primary" id="analyze-btn" disabled>🚀 Find Media</button>
                <button class="btn btn-secondary" id="clear-btn">✕ Clear</button>
            </div>
        </section>
        
        <div class="error-message" id="error-message"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loading-text">Analyzing your image...</p>
        </div>
        
        <section class="results-section" id="results-section">
            <div class="caption-display" id="caption-display"></div>
            <div class="results-grid" id="results-grid"></div>
        </section>
        
        <footer>
            <p>Powered by <a href="https://huggingface.co/docs/transformers.js" target="_blank">Transformers.js</a> • AI runs in your browser • No data sent anywhere</p>
        </footer>
    </div>
    
    <canvas id="canvas" style="display: none;"></canvas>
    
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.4.1';
        
        // DOM
        const $ = id => document.getElementById(id);
        const fileInput = $('file-input');
        const uploadBtn = $('upload-btn');
        const cameraBtn = $('camera-btn');
        const cameraContainer = $('camera-container');
        const cameraVideo = $('camera-video');
        const captureBtn = $('capture-btn');
        const closeCameraBtn = $('close-camera-btn');
        const previewContainer = $('preview-container');
        const previewImage = $('preview-image');
        const analyzeBtn = $('analyze-btn');
        const clearBtn = $('clear-btn');
        const loading = $('loading');
        const loadingText = $('loading-text');
        const resultsSection = $('results-section');
        const captionDisplay = $('caption-display');
        const resultsGrid = $('results-grid');
        const errorMessage = $('error-message');
        const uploadSection = $('upload-section');
        const canvas = $('canvas');
        const modelStatus = $('model-status');
        const progressFill = $('progress-fill');
        
        let currentImageUrl = null;
        let stream = null;
        let captioner = null;
        
        // Load model
        async function loadModel() {
            try {
                captioner = await pipeline('image-to-text', 'Xenova/vit-gpt2-image-captioning', {
                    progress_callback: (progress) => {
                        if (progress.status === 'progress' && progress.progress) {
                            progressFill.style.width = `${Math.round(progress.progress)}%`;
                        }
                    }
                });
                
                modelStatus.className = 'model-status ready';
                modelStatus.innerHTML = '✅ AI ready! Upload an image to get started.';
                uploadBtn.disabled = false;
                cameraBtn.disabled = false;
            } catch (e) {
                console.error('Model load error:', e);
                modelStatus.className = 'model-status error';
                modelStatus.innerHTML = `❌ Error: ${e.message || 'Unknown error'}. <button onclick="location.reload()" style="background:#e94560;color:white;border:none;padding:5px 15px;border-radius:5px;cursor:pointer;margin-left:10px;">Retry</button>`;
            }
        }
        
        loadModel();
        
        // Events
        uploadBtn.onclick = () => fileInput.click();
        
        fileInput.onchange = e => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        };
        
        uploadSection.ondragover = e => { e.preventDefault(); uploadSection.classList.add('dragover'); };
        uploadSection.ondragleave = () => uploadSection.classList.remove('dragover');
        uploadSection.ondrop = e => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            if (e.dataTransfer.files[0]?.type.startsWith('image/')) {
                handleFile(e.dataTransfer.files[0]);
            }
        };
        
        function handleFile(file) {
            currentImageUrl = URL.createObjectURL(file);
            previewImage.src = currentImageUrl;
            previewContainer.classList.add('active');
            cameraContainer.classList.remove('active');
            stopCamera();
            hideError();
            if (captioner) analyzeBtn.disabled = false;
        }
        
        cameraBtn.onclick = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraVideo.srcObject = stream;
                cameraContainer.classList.add('active');
                previewContainer.classList.remove('active');
            } catch (e) {
                showError('Could not access camera. Try uploading instead.');
            }
        };
        
        captureBtn.onclick = () => {
            canvas.width = cameraVideo.videoWidth;
            canvas.height = cameraVideo.videoHeight;
            canvas.getContext('2d').drawImage(cameraVideo, 0, 0);
            canvas.toBlob(blob => {
                currentImageUrl = URL.createObjectURL(blob);
                previewImage.src = currentImageUrl;
                previewContainer.classList.add('active');
                cameraContainer.classList.remove('active');
                stopCamera();
                if (captioner) analyzeBtn.disabled = false;
            }, 'image/jpeg', 0.8);
        };
        
        closeCameraBtn.onclick = () => { cameraContainer.classList.remove('active'); stopCamera(); };
        
        clearBtn.onclick = () => {
            if (currentImageUrl) URL.revokeObjectURL(currentImageUrl);
            currentImageUrl = null;
            previewContainer.classList.remove('active');
            resultsSection.classList.remove('active');
            analyzeBtn.disabled = true;
            fileInput.value = '';
            hideError();
        };
        
        function stopCamera() {
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        }
        
        analyzeBtn.onclick = analyze;
        
        async function analyze() {
            if (!currentImageUrl || !captioner) return;
            
            hideError();
            loading.classList.add('active');
            resultsSection.classList.remove('active');
            analyzeBtn.disabled = true;
            loadingText.textContent = 'Analyzing image with AI...';
            
            try {
                const result = await captioner(currentImageUrl);
                const caption = result[0]?.generated_text || 'an interesting image';
                
                loadingText.textContent = 'Finding related content...';
                const results = generateResults(caption);
                showResults(caption, results);
            } catch (e) {
                console.error('Analysis error:', e);
                showError(e.message || 'Something went wrong. Try again.');
            } finally {
                loading.classList.remove('active');
                analyzeBtn.disabled = false;
            }
        }
        
        function generateResults(caption) {
            const q = encodeURIComponent(caption);
            const short = caption.split(' ').slice(0, 4).join(' ');
            const sq = encodeURIComponent(short);
            
            return [
                { type: 'youtube', title: `Videos: ${caption}`, url: `https://www.youtube.com/results?search_query=${q}`, meta: 'YouTube' },
                { type: 'youtube', title: `${short} tutorial`, url: `https://www.youtube.com/results?search_query=${sq}+tutorial`, meta: 'YouTube' },
                { type: 'youtube', title: `${short} explained`, url: `https://www.youtube.com/results?search_query=${sq}+explained`, meta: 'YouTube' },
                { type: 'article', title: `Search: ${caption}`, url: `https://www.google.com/search?q=${q}`, meta: 'Google' },
                { type: 'article', title: `${caption} - Wikipedia`, url: `https://en.wikipedia.org/wiki/Special:Search?search=${q}`, meta: 'Wikipedia' },
                { type: 'article', title: `News about ${short}`, url: `https://news.google.com/search?q=${sq}`, meta: 'Google News' },
                { type: 'article', title: `Reddit: ${short}`, url: `https://www.reddit.com/search/?q=${sq}`, meta: 'Reddit' },
                { type: 'image', title: `Photos: ${caption}`, url: `https://unsplash.com/s/photos/${q}`, meta: 'Unsplash' },
                { type: 'image', title: `${short} images`, url: `https://www.pexels.com/search/${sq}/`, meta: 'Pexels' },
                { type: 'image', title: `${short} on Pinterest`, url: `https://www.pinterest.com/search/pins/?q=${sq}`, meta: 'Pinterest' }
            ];
        }
        
        function showResults(caption, results) {
            captionDisplay.innerHTML = `<strong>AI detected:</strong> "${caption}"`;
            resultsGrid.innerHTML = '';
            
            const icons = { youtube: '▶️', article: '📄', image: '🖼️' };
            
            results.forEach(r => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <a href="${r.url}" target="_blank" rel="noopener">
                        <div class="card-thumbnail placeholder">${icons[r.type]}</div>
                        <div class="card-content">
                            <span class="card-type ${r.type}">${r.type}</span>
                            <h3 class="card-title">${escapeHtml(r.title)}</h3>
                            <p class="card-meta">${r.meta}</p>
                        </div>
                    </a>
                `;
                resultsGrid.appendChild(card);
            });
            
            resultsSection.classList.add('active');
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }
        
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('active');
        }
        
        function hideError() {
            errorMessage.classList.remove('active');
        }
    </script>
</body>
</html>
